name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "feature/react-enterprise-gecis"] # Sadece main ve yeni feature branch'te çalışır

# GitHub Pages'e deploy yapabilmek için gerekli güvenlik izinleri
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda birden fazla deploy çalışırsa çakışmayı önlemek için kuyruğa alır
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'react-enterprise-app/package-lock.json'

      - name: Install Dependencies & Build React App
        run: |
          echo "React Enterprise App derleniyor..."
          cd react-enterprise-app
          npm ci
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Eski kök dizini değil, yeni derlenen React projesinin dist klasörünü yüklüyoruz
          path: './react-enterprise-app/dist'

      - name: Deploy to GitHub Actions
        id: deployment
        uses: actions/deploy-pages@v4