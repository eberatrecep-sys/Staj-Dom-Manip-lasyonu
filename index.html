<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale= 1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav id="navbar">
        <button id="shoppingTabBtn" class="tab-btn active">Alışveriş Listesi</button>
        <button id="settingsTabBtn" class="tab-btn">Ayarlar</button>
    </nav>

    <main>
        <h1>Alışveriş Uygulaması</h1>

        <section id="shoppingSection" class="tab-content active">
            <h2>Alışveriş Listesi</h2>
            <div id="errorContainer" class="error-message" aria-live="assertive"></div>
            <div class="input-container">
                <label for="itemInput" class="sr-only">Ürün Adı</label>
                <input type="text" id="itemInput" placeholder="Ürün adı giriniz...">

                <label for="itemQuantity" class="sr-only">Adet</label>
                <input type="number" id="itemQuantity" placeholder="Adet" min="1">
            </div>
            <button id="addButton">Ekle</button>

            <div class="list-header">
                <span class="header-name">Ürün Adı</span>
                <span class="header-quantity">Adet</span>
                <span class="header-action">İşlem</span>
            </div>
            <ul id="itemList"></ul>
        </section>

        <section id="settingsSection" class="tab-content">
            <h2>Ayarlar</h2>
            <button id="themeToggleBtn">Temayı Değiştir</button>
        </section>
    </main>

    <script src="app.js"></script>
</body>


</html>
